<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Programs — AIKRA AI Institute</title>
  <meta name="description" content="Browse all AIKRA AI Institute programs — from AI Fundamentals to Generative AI, Deep Learning and Data Science." />
  <link rel="icon" type="image/svg+xml" href="assets/favicon.svg" />
  <link rel="preconnect" href="https://fonts.googleapis.com" /><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;500;600;700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="assets/css/styles.css" />
  <!-- Editable content (see content/README.md) -->
  <script src="content/site.js"></script>
  <script src="content/courses.js"></script>
  <script src="content/reviews.js"></script>
</head>
<body>
  <div id="header"></div>
  <main style="padding-top:7.5rem;">
    <section class="container-aai" style="padding-bottom:1rem;">
      <p class="crumb reveal"><a href="index.html">Home</a> › Programs</p>
      <span class="eyebrow reveal"><span class="dot"></span> Curriculum</span>
      <h1 class="h-display reveal d1" style="margin-top:1rem;">Explore <span class="gradient-text">AI programs</span></h1>
      <p class="muted reveal d2" style="margin-top:1rem;max-width:40rem;font-size:1.1rem;">Project-first programs across foundations, core AI and modern AI. Find the trajectory that fits your goals.</p>
    </section>

    <section class="section" style="padding-top:2.5rem;">
      <div class="container-aai">
        <div class="reveal" style="margin-bottom:2.5rem;display:flex;flex-wrap:wrap;gap:1rem;align-items:center;justify-content:space-between;">
          <input id="course-search" type="search" placeholder="Search programs..." style="max-width:20rem;" class="field" />
          <div id="course-filters" style="display:flex;flex-wrap:wrap;gap:.5rem;">
            <button class="is-active" data-filter="All">All</button>
            <button data-filter="Foundations">Foundations</button>
            <button data-filter="Core AI">Core AI</button>
            <button data-filter="Modern AI">Modern AI</button>
            <button data-filter="Data">Data</button>
            <button data-filter="Projects">Projects</button>
          </div>
        </div>
        <p class="reveal dim" style="margin:-1rem 0 1.5rem;font-size:.85rem;">Showing <span id="result-count" style="color:var(--cyan);font-weight:600;">all programs</span></p>
        <div id="course-grid" class="grid-3" data-stagger></div>
        <p id="no-results" class="hidden muted" style="padding:3rem 0;text-align:center;">No programs match your search.</p>
      </div>
    </section>
  </main>
  <div id="footer"></div>

  <script src="assets/js/partials.js"></script>
  <script>
    const COURSES = window.AIKRA.courses;
    document.getElementById('course-grid').innerHTML = COURSES.map((c,i) => `
      <a href="contact.html" class="card card-hover reveal course-item" data-tilt data-category="${c.cat}" data-title="${c.title.toLowerCase()}" style="display:flex;flex-direction:column;">
        <span class="spark"></span>
        <div style="display:flex;justify-content:space-between;align-items:flex-start;">
          <span class="ic-badge">${c.icon}</span><span class="tag">${c.cat}</span>
        </div>
        <h3 style="margin-top:1.1rem;font-size:1.1rem;">${c.title}</h3>
        <p class="muted" style="margin-top:.5rem;flex:1;font-size:.88rem;">${c.desc}</p>
        <div style="margin-top:1.1rem;display:flex;justify-content:space-between;align-items:center;border-top:1px solid var(--line);padding-top:1rem;">
          <span class="dim" style="font-size:.78rem;">${c.meta}</span>
          <span class="holo-text" style="font-family:'Fredoka';font-weight:700;">${c.price}</span>
        </div>
      </a>`).join('');
  </script>
  <script src="assets/js/app.js"></script>
</body>
</html>
